<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de tareas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="contenedor">
    <h1>Lista de Tareas</h1>

    <section class="formulario" aria-label="Agregar tarea">
      <input type="text" placeholder="Escribe una tarea..." aria-label="Nombre de la tarea">
      <textarea placeholder="Descripción..." aria-label="Descripción de la tarea"></textarea>
      <button class="btnAdd" type="button">Agregar Tarea</button>
    </section>

    <section class="lista-tareas" aria-label="Lista de tareas">
      <ul id="listaTareas"> </ul>
    </section>


  </main>
  <script src="script.js"></script>
</body>
</html>
